system = "JMCP"
version = 1

[policy]
default = "manual"
generated_content_must_be_reproducible = true
generated_content_requires_marker = true

[[zone]]
allowed = true
command = "npm run guard:generated-client"
kind = "typescript-contract-client"
path = "apps/cockpit/src/gen/jmcp-core.ts"
required_marker = "Generated by: core contract client. Source: jmcp-core /contract + /runtime."
source = "jmcp-core /contract + /runtime -> apps/cockpit/src/gen/jmcp-core.ts"
